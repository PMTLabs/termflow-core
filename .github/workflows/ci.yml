name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: [self-hosted]
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    # terminal-core is consumed as a BUILT package (@termflow/terminal-core),
    # so its dist must exist before typecheck / tests can resolve its types.
    - name: Build terminal-core
      run: bun run build:terminal-core

    - name: Type check
      run: npx tsc --noEmit -p tsconfig.json

    - name: Package unit tests (terminal-core)
      run: bun run test:workspace

    - name: Unit tests
      run: npm test

  build:
    name: Build
    needs: test
    runs-on: [self-hosted]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build application
      run: npm run build

  security:
    name: Security Scan
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    # Advisory only — never blocks the pipeline. (bun is the package manager here,
    # so we synthesize a lockfile just for the audit.)
    - name: npm audit (advisory)
      run: |
        npm install --package-lock-only --omit=dev
        npm audit --omit=dev
      continue-on-error: true
