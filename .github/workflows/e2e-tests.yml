name: E2E Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

# The Playwright e2e/performance suites in this workflow are QUARANTINED: they target
# the obsolete Electron build and give no signal on the current Tauri product (the
# webServer cold-compiles the Rust backend past its timeout, and on a runner without a
# Rust toolchain it fails immediately on `cargo metadata`). They stay here — documented
# and ready to rewrite — but do not run. Flip this flag to 'true' once the suites are
# rewritten for Tauri. The real signal in the e2e-tests job (the unit tests) always runs.
env:
  RUN_QUARANTINED_E2E: 'false'

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: [self-hosted]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build application
      run: npm run build

    # Browsers are only needed by the QUARANTINED e2e suite below, which is gated off
    # via RUN_QUARANTINED_E2E — so skip the install while the suite is dormant.
    - name: Install Playwright Browsers
      if: env.RUN_QUARANTINED_E2E == 'true'
      run: npx playwright install
      continue-on-error: true

    - name: Package unit tests (terminal-core)
      run: bun run test:workspace

    - name: Run unit tests
      run: npm test

    # QUARANTINED: targets the OBSOLETE Electron build (electron-launcher, webServer
    # port 3000). On Tauri it gives no signal and cold-compiles the Rust backend past
    # the webServer timeout; on a runner without a Rust toolchain it dies immediately
    # on `cargo metadata`. Gated off via RUN_QUARANTINED_E2E — re-enable once the suite
    # is rewritten for Tauri (tracked follow-up). continue-on-error is kept so that a
    # re-enabled but still-flaky suite never blocks CI during the rewrite.
    - name: Run E2E tests
      if: env.RUN_QUARANTINED_E2E == 'true'
      run: npm run test:e2e
      continue-on-error: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always() && env.RUN_QUARANTINED_E2E == 'true'
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload test videos
      uses: actions/upload-artifact@v4
      if: always() && env.RUN_QUARANTINED_E2E == 'true'
      with:
        name: test-videos
        path: test-results/
        retention-days: 7

  performance-tests:
    timeout-minutes: 30
    runs-on: [self-hosted]
    # QUARANTINED job — same obsolete Electron Playwright harness, no signal on Tauri.
    # Disabled until rewritten. Original trigger was:
    #   github.event_name == 'push' && github.ref == 'refs/heads/main'
    # (the env context is not available in a job-level `if`, so this uses a literal
    # false rather than the RUN_QUARANTINED_E2E flag the e2e steps use.)
    if: false

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build application
      run: npm run build

    # Non-blocking install (see the e2e job): avoids the self-hosted apt-lock
    # failure mode; the perf suite below is quarantined anyway.
    - name: Install Playwright Browsers
      run: npx playwright install
      continue-on-error: true

    # QUARANTINED (non-blocking): same stale Electron-era Playwright harness as the
    # e2e job above; must be rewritten for Tauri (tracked follow-up).
    - name: Run performance tests
      run: npx playwright test performance.spec.ts --reporter=json
      continue-on-error: true

    - name: Process performance results
      run: |
        echo "Performance test completed"
        # Add performance metrics processing here if needed
