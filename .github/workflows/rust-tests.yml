name: Rust Tests

# Runs the Rust suite on BOTH Linux and Windows.
#
# - Linux (GitHub-hosted ubuntu-latest): runs the full suite WITH the
#   `integration-tests` feature. That feature turns on tauri's `test` feature so
#   the concurrency regression test can build an AppState<MockRuntime> via
#   `tauri::test::mock_app()` and drive the real `send_prompt_to_terminal` handler.
#
# - Windows (self-hosted): runs ONLY the default unit suite (NO `integration-tests`).
#   Enabling tauri's `test` feature on Windows makes the compiled test binary fail
#   at loader time (STATUS_ENTRYPOINT_NOT_FOUND, 0xC0000139) before any test runs,
#   so the mock_app integration test is Linux-only by design. Windows still covers
#   compilation + all 79 unit tests on the production (Wry) runtime.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  rust-test:
    name: Rust Tests (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runs-on: ubuntu-latest
            # Linux can run the mock_app integration test.
            test-args: "--features integration-tests"
          - name: Windows
            # Self-hosted Windows runner. Adjust the labels to match your runner
            # if it doesn't carry the default `windows` OS label.
            runs-on: [ self-hosted, windows ]
            # No integration-tests on Windows (tauri/test crashes the test binary
            # at loader time); default unit suite only.
            test-args: ""
    steps:
      - uses: actions/checkout@v4

      # Linux-only: Tauri 2 links webkit2gtk/gtk to compile on this target.
      # ubuntu-latest (24.04) ships the 4.1 line. Windows already has the WebView2
      # SDK / MSVC toolchain on the self-hosted box.
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      # dtolnay/rust-toolchain is a bash composite action; on a self-hosted Windows
      # runner it mangles the temp script path (backslashes stripped) and fails. Use
      # it only on the GitHub-hosted Linux runner; the self-hosted Windows box is the
      # dev machine and already has rustup/cargo installed — just verify it.
      - name: Setup Rust toolchain (Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust toolchain (Windows)
        if: runner.os == 'Windows'
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # NEVER cache ~/.cargo/bin: rust-cache's post step prunes that dir back
          # to its cached snapshot. On the PERSISTENT self-hosted Windows runner
          # that is the real user profile — every job ended by deleting the dev
          # box's restored rustup.exe, which then failed the NEXT run's
          # "Verify Rust toolchain" step (recurring since ~Jul 2).
          cache-bin: "false"

      # The PTY-host sidecar crates (pty-host / pty-protocol) are separate
      # manifests, NOT workspace members, so `cargo test` in src-tauri does not
      # cover them. Test them explicitly — this is where the cross-platform
      # transport/detach/session hardening lives (Unix socket perms + peer-cred +
      # symlink rejection + process-group kill on Linux; named-pipe DACL on
      # Windows). Pure Rust: no bun / webkit needed, so it runs before that setup
      # and fails fast on a sidecar regression.
      - name: Test PTY-host sidecar crates
        working-directory: src-tauri
        run: |
          cargo test --manifest-path pty-protocol/Cargo.toml
          cargo test --manifest-path pty-host/Cargo.toml

      # src-tauri/build.rs shells out to `bun scripts/build-mcp-sidecar.mjs`, so bun
      # must be present before cargo compiles the crate. On the self-hosted Windows
      # box bun is already installed; oven-sh/setup-bun fails there trying to
      # overwrite the in-use bun.exe (EBUSY), so only run it on Linux and verify on
      # Windows.
      - name: Setup Bun (Linux)
        if: runner.os == 'Linux'
        uses: oven-sh/setup-bun@v2

      - name: Verify Bun (Windows)
        if: runner.os == 'Windows'
        run: bun --version

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # build.rs runs `bun build --compile mcp-server/src/index.ts`, which resolves
      # mcp-server's deps (@modelcontextprotocol/sdk, zod, ...). `mcp-server` is NOT
      # a root workspace (workspaces = terminal-monitor, packages/*), so the root
      # `bun install` above does not install them — a separate install here is
      # required or the sidecar build fails on a clean checkout (verified).
      - name: Install MCP sidecar dependencies
        working-directory: mcp-server
        run: bun install --frozen-lockfile

      # Linux: unit + integration (--features integration-tests).
      # Windows: unit suite only (test-args empty).
      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test ${{ matrix.test-args }}
