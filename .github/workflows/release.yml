name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Auto Terminal ${{ github.ref }}
        draft: false
        prerelease: false

  build-release:
    name: Build Release
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: auto-terminal-linux
            asset_extension: .AppImage
          - os: windows-latest
            artifact_name: auto-terminal-windows
            asset_extension: .exe
          - os: macos-latest
            artifact_name: auto-terminal-macos
            asset_extension: .dmg
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build application
      run: npm run build

    - name: Build installer
      run: npm run dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CSC_LINK: ${{ secrets.MAC_CERTS }}
        CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        WIN_CSC_LINK: ${{ secrets.WIN_CERTS }}
        WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTS_PASSWORD }}
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.release.outputs.upload_url }}
        asset_path: ./dist/${{ matrix.artifact_name }}${{ matrix.asset_extension }}
        asset_name: ${{ matrix.artifact_name }}${{ matrix.asset_extension }}
        asset_content_type: application/octet-stream

  publish-docs:
    name: Publish Documentation
    needs: release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Build docs
      run: |
        bun install --frozen-lockfile
        npm run docs:build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs-dist